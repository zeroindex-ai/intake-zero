name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # `next build` is intentionally omitted from CI:
      # the build wraps `next.config.ts` with `withWorkflow`, which contacts
      # Vercel-side WDK infrastructure for build manifests. Vercel runs the
      # real build during deploy; CI sticks to source-level checks.
